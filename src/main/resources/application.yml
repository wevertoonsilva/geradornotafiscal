management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  statsd:
    metrics:
      export:
        enabled: true
        flavor: datadog
        host: ${DD_AGENT_HOST:localhost}
        port: 8125
  metrics:
    tags:
      service: geradornotafiscal
      env: ${DD_ENV:dev}

springdoc:
  api-docs:
    path: /v1/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  show-actuator: false
