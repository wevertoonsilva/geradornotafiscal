name: CI/CD — Build, Test, Push ECR, Deploy ECS

on:
  push:
    branches: [ main ]           # deploy automático ao mergear
    tags: [ 'v*.*.*' ]           # deploy de release ao criar tag
  pull_request:
    branches: [ main ]           # validação em PRs — sem deploy

permissions:
  id-token: write                # obrigatório para OIDC
  contents: read
  pull-requests: write           # permite comentar resultado no PR

env:
  AWS_REGION:      ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID:  ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY:  ${{ secrets.ECR_REPOSITORY }}
  ECS_CLUSTER:     geradornotafiscal-cluster
  ECS_SERVICE:     geradornotafiscal-service
  CONTAINER_NAME:  geradornotafiscal

jobs:

  # ── Job 1: Testes — roda em todo evento (PR, push main, tag) ─
  test:
    name: Testes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven             # cacheia ~/.m2 entre runs — build ~2x mais rápido

      - name: Executar testes
        run: mvn test --batch-mode

      - name: Publicar relatório de testes
        uses: actions/upload-artifact@v4
        if: always()               # publicar mesmo se os testes falharem
        with:
          name: test-report
          path: target/surefire-reports/
          retention-days: 7

      # Em PRs, comentar o resultado diretamente no PR
      - name: Comentar resultado no PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const conclusion = '${{ job.status }}' === 'success' ? '✅ Testes passaram' : '❌ Testes falharam';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### CI — ${conclusion}
Commit: \`${{ github.sha }}\`
  Ver detalhes na [aba Actions](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).`
  })

# ── Job 2: Build + Push ECR + Deploy ECS ─────────────────────
# Só executa em push na main ou criação de tag — NUNCA em PR
build-and-deploy:
  name: Build, Push e Deploy
  runs-on: ubuntu-latest
  needs: test                    # só executa se os testes passarem
  if: github.event_name != 'pull_request'   # bloqueia deploy em PR
  environment: production        # habilita aprovação manual no GitHub se configurado

  steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Autenticação na AWS via OIDC — sem Access Key no repositório
    - name: Autenticar na AWS (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    # Login no ECR
    - name: Login no Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # Definir a tag da imagem
    # Push na main   → tag = SHA curto (ex: a1b2c3d)
    # Tag de release → tag = versão-SHA  (ex: v1.0.0-a1b2c3d)
    - name: Definir tag da imagem
      id: image-tag
      run: |
        SHA_SHORT=${GITHUB_SHA:0:7}
        if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          RELEASE_TAG=${GITHUB_REF#refs/tags/}
          echo "full_tag=${RELEASE_TAG}-${SHA_SHORT}" >> $GITHUB_OUTPUT
        else
          echo "full_tag=${SHA_SHORT}" >> $GITHUB_OUTPUT
        fi

    # Build da imagem Docker
    - name: Build da imagem
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ steps.image-tag.outputs.full_tag }}
      run: |
        IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker build -t $IMAGE_URI .
        echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

    # Scan de vulnerabilidades — bloqueia se encontrar HIGH ou CRITICAL
    - name: Scan de vulnerabilidades (Trivy)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ steps.build-image.outputs.image }}
        format: table
        exit-code: '1'
        severity: 'HIGH,CRITICAL'
        ignore-unfixed: true     # ignora vulnerabilidades sem fix disponível

    # Push para o ECR — só ocorre se o scan passar
    - name: Push para ECR
      env:
        IMAGE_URI: ${{ steps.build-image.outputs.image }}
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        docker push $IMAGE_URI
        docker tag $IMAGE_URI $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

    # Atualizar o task definition com a nova imagem
    - name: Atualizar task definition com nova imagem
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-image.outputs.image }}

    # Deploy no ECS — registra nova revisão do task definition e atualiza o service
    - name: Deploy no ECS Fargate
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true   # aguarda rollout completar

    # Sumário do deploy para visualização na aba Actions do GitHub
    - name: Sumário do deploy
      run: |
        echo "## Deploy concluído ✅" >> $GITHUB_STEP_SUMMARY
        echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| Imagem | \`${{ steps.build-image.outputs.image }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Cluster | \`${{ env.ECS_CLUSTER }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Service | \`${{ env.ECS_SERVICE }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| Autor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY